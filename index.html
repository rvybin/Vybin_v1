<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <title>Vybin | The App Built for McGill Students</title>
    <meta
      name="description"
      content="Vybin is the student app for McGill University. Discover campus events, track applications, import your class schedule, and get AI-powered campus advice."
    />
    <meta name="application-name" content="Vybin" />
    <meta name="apple-mobile-web-app-title" content="Vybin" />
    <link rel="canonical" href="https://vybin.org/" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0B0C10" />

    <!-- Favicon / App Icons -->
    <link rel="icon" type="image/png" href="/VybinLogo.png" />
    <link rel="shortcut icon" type="image/png" href="/VybinLogo.png" />
    <link rel="apple-touch-icon" href="/VybinLogo.png" />
    <link rel="manifest" href="/manifest.json" />

    <!-- Open Graph -->
    <meta property="og:title" content="Vybin | The App Built for McGill Students" />
    <meta
      property="og:description"
      content="Vybin is the student app for McGill University. Discover campus events, import your class schedule, and get AI-powered campus advice."
    />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://vybin.org/" />
    <meta property="og:site_name" content="Vybin" />
    <meta property="og:image" content="https://vybin.org/Vybin_Org.png" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Vybin | Discover Campus Events That Matter" />
    <meta
      name="twitter:description"
      content="Discover campus events, track applications, and stay organized with Vybin."
    />
    <meta name="twitter:image" content="https://vybin.org/Vybin_Org.png" />

    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "Organization",
        "name": "Vybin",
        "url": "https://vybin.org/",
        "logo": "https://vybin.org/Vybin_Org.png",
        "email": "vybinorg@gmail.com"
      }
    </script>
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebSite",
        "name": "Vybin",
        "url": "https://vybin.org/"
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
